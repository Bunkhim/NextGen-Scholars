name: scholarship_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dropdown_button2: ^2.3.9
  image_picker: ^1.2.1
  flutter_localizations:
    sdk: flutter
  google_fonts: ^8.0.1
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  carousel_slider: ^5.1.1
  smooth_page_indicator: ^1.2.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.6.5
  http: ^1.2.1
  google_sign_in: ^6.2.1
  google_generative_ai: any
  flutter_dotenv: ^6.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  url_launcher: ^6.2.5
  flutter_facebook_auth: ^7.1.5
  cloud_functions: ^5.6.2
  reorderable_grid_view: ^2.2.8
  device_preview: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path_ios: "assets/icons/NextGen_LOGO.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/nextgen_logo.png"
  image_path_android: "assets/icons/NextGen_LOGO.jpeg"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# The following section is specific to Flutter packages.
flutter:
  assets:
    - assets/images/onboarding/
    - assets/images/
    - assets/icons/
    - assets/
    - .env
  uses-material-design: true
